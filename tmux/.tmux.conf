# My tmux config

# Plugins
set -g @plugin 'tmux-plugins/tpm'

# Tmux theme
set -g mode-style "fg=#262427,bg=#fcfcfa"
set -g message-style "fg=#262427,bg=#fcfcfa"
set -g message-command-style "fg=#262427,bg=#fcfcfa"
set -g pane-border-style "fg=#322e32"
set -g pane-active-border-style "fg=#fcfcfa"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#fcfcfa,bg=#262427"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#fcfcfa,bg=#1c1b1c,bold] #S #[fg=#fcfcfa,bg=#262427,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#262427,bg=#262427,nobold,nounderscore,noitalics]#[fg=#1c1b1c,bg=#262427] #{prefix_highlight} #[fg=#fcfcfa,bg=#262427,nobold,nounderscore,noitalics]#[fg=#fcfcfa,bg=#322e32] %Y-%m-%d %H:%M #[fg=#1c1b1c,bg=#322e32,nobold,nounderscore,noitalics]#[fg=#fcfcfa,bg=#1c1b1c,bold] #h "
setw -g window-status-activity-style "underscore,fg=#7b7c7e,bg=#262427"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#fcfcfa,bg=#262427"
setw -g window-status-format "#[fg=#fcfcfa,bg=#262427,nobold,nounderscore,noitalics]#[default] #I | #W #F #[fg=#fcfcfa,bg=#262427,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#322e32,bg=#fcfcfa,nobold,nounderscore,noitalics]#[fg=#322e32,bg=#fcfcfa,bold] #I | #W #F #[fg=#fcfcfa,bg=#262427,nobold,nounderscore,noitalics]"

# Set the default terminal
set -g default-terminal "xterm-256color"

# Enable mouse or macos is a pain
set-option -g mouse on

if-shell -b "[ `command -v 'pbcopy'` ]" {
  set -s copy-command 'pbcopy'
}

# Increase scrollback
set-option -g history-limit 10000

# Check if we can use true colours
if-shell "test $COLORTERM = 'truecolor'" "set-option -ga terminal-overrides ',xterm-256color:Tc'"

# Allow title setting
set-option -g set-titles on
set-option -g set-titles-string "#T"

#-------------------------------------------------------------------------------
# Key bindings
#-------------------------------------------------------------------------------

# BSP
bind -n M-Enter if-shell "[ $(($(tmux display -p '8*#{pane_width}-20*#{pane_height}'))) -lt 0 ]" "splitw -v -c '#{pane_current_path}'" "splitw -h -c '#{pane_current_path}'"

# Swap panes
bind-key y swap-pane \; send-prefix \; select-pane -M

# Resize panes with option + arrow keys
bind -n M-Left resize-pane -L 10
bind -n M-Right resize-pane -R 10
bind -n M-Down resize-pane -D 10
bind -n M-Up resize-pane -U 10

# Select pane with ctrl + vim nav keys
bind-key l select-pane -R
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim keybindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Easily reload source config while in tmux
bind-key r source-file ~/.tmux.conf

# Clear screen and scrollback
# bind -n C-l send-keys C-l \; send-keys -R \; clear-history # NOTE: Cannot use will conflict with vim-tmux intergration
bind C-l send-keys C-l \; send-keys -R \; clear-history

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# See: https://blog.bugsnag.com/tmux-and-vim/
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"
bind -n C-h run "($is_vim && tmux send-keys C-h) || \
                 tmux select-pane -L"
bind -n C-j run "($is_vim && tmux send-keys C-j)  || \
                 ($is_fzf && tmux send-keys C-j) || \
                 tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || \
                 ($is_fzf && tmux send-keys C-k)  || \
                 tmux select-pane -U"
bind -n C-l run "($is_vim && tmux send-keys C-l) || \
                 tmux select-pane -R"
#bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
#bind-key -T copy-mode-vi C-\ select-pane -l

#-------------------------------------------------------------------------------
# Packages
#-------------------------------------------------------------------------------

# Initialise TPM
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"
